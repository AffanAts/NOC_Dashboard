<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
    :root {
        --bg-base: #0a0e14;
        --bg-surface: #11161d;
        --bg-elevated: #161c25;
        --border-subtle: #21262d;
        --border-default: #30363d;
        --text-primary: #f0f6fc;
        --text-secondary: #8b949e;
        --accent-green: #3fb950;
        --accent-yellow: #f1e05a;
        --accent-red: #f85149;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        background: var(--bg-base);
        color: var(--text-primary);
        font-family: 'Inter', system-ui, sans-serif;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        font-size: 11px;
    }

    /* ===== HEADER ===== */
    .header {
        background: var(--bg-surface);
        border-bottom: 1px solid var(--border-subtle);
        padding: 5px 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
        gap: 8px;
    }
    .header-title {
        font-size: 10px;
        font-weight: 700;
        color: #f85149;
        letter-spacing: 0.4px;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 5px;
        white-space: nowrap;
    }
    .header-meta {
        font-size: 9px;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
    }
    .badge-count {
        background: #f85149;
        color: #fff;
        font-size: 9px;
        font-weight: 700;
        padding: 1px 5px;
        border-radius: 8px;
        min-width: 16px;
        text-align: center;
    }
    .dot-live {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--accent-green);
        box-shadow: 0 0 4px var(--accent-green);
        animation: blink 1.8s infinite;
        flex-shrink: 0;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    /* ===== SCROLL BODY ===== */
    .body {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 6px 8px;
        scrollbar-width: thin;
        scrollbar-color: #30363d transparent;
        display: flex;
        flex-direction: column;
        gap: 6px;
    }
    .body::-webkit-scrollbar { width: 3px; }
    .body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    /* ===== SIDE BY SIDE ROW ===== */
    .row-split {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        flex-shrink: 0;
    }

    /* ===== SECTION BLOCK ===== */
    .section-block {
        background: var(--bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: 5px;
        overflow: hidden;
        flex-shrink: 0;
    }
    .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 4px 8px;
        border-bottom: 1px solid var(--border-subtle);
        background: #0d1117;
    }
    .section-label {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 5px;
    }
    .section-label .dot {
        width: 5px; height: 5px;
        border-radius: 50%;
        flex-shrink: 0;
    }
    .section-meta {
        font-size: 9px;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .section-count {
        font-size: 9px;
        font-weight: 700;
        padding: 1px 5px;
        border-radius: 6px;
        min-width: 14px;
        text-align: center;
    }
    .section-body { padding: 5px 6px; display: flex; flex-direction: column; gap: 4px; }

    /* ===== EMPTY ROW ===== */
    .empty-row {
        text-align: center;
        padding: 8px 0;
        color: var(--text-secondary);
        font-size: 10px;
        opacity: 0.6;
    }

    /* ===== STREAK ROW ===== */
    .streak-row {
        display: flex;
        align-items: center;
        gap: 7px;
        background: var(--bg-elevated);
        border-radius: 4px;
        padding: 5px 8px;
        border-left: 2px solid var(--accent-red);
    }
    .streak-row.critical { animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.75;} }

    .streak-channel-name {
        font-size: 10px;
        font-weight: 600;
        color: var(--text-primary);
        min-width: 0;
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .streak-bars { display: flex; gap: 3px; flex-shrink: 0; }
    .streak-bar {
        width: 18px;
        height: 18px;
        border-radius: 3px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        font-weight: 700;
        color: #0a0e14;
        cursor: default;
        flex-shrink: 0;
    }
    .streak-bar.red    { background: var(--accent-red); }
    .streak-bar.yellow { background: var(--accent-yellow); }
    .streak-bar.green  { background: var(--accent-green); }
    .streak-bar.empty  { background: var(--border-default); color: var(--text-secondary); }

    .streak-badge {
        flex-shrink: 0;
        font-size: 9px;
        font-weight: 700;
        padding: 1px 5px;
        border-radius: 8px;
        white-space: nowrap;
    }
    .streak-badge.warn1   { background: rgba(248,81,73,0.15); color: var(--accent-red);  border: 1px solid var(--accent-red); }
    .streak-badge.warn2   { background: rgba(248,81,73,0.25); color: #ff6b6b;             border: 1px solid #ff6b6b; }
    .streak-badge.warn3   { background: rgba(248,81,73,0.40); color: #ff4040;             border: 1px solid #ff4040; }
    .streak-badge.critical{ background: var(--accent-red); color: #0a0e14; }

    /* ===== NORMAL ROW ===== */
    .normal-row {
        display: flex;
        align-items: center;
        gap: 7px;
        background: transparent;
        border-radius: 4px;
        padding: 3px 8px;
        opacity: 0.55;
    }
    .normal-row .streak-channel-name { font-size: 9px; font-weight: 400; color: var(--text-secondary); }
    .normal-row .streak-bars { display: flex; gap: 3px; flex-shrink: 0; }
    .normal-row .streak-bar { width: 14px; height: 14px; font-size: 8px; }

    /* ===== QRIS DNH ===== */
    .qris-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        background: var(--bg-elevated);
        border-radius: 4px;
        padding: 5px 8px;
        border-left: 2px solid var(--border-default);
    }
    .qris-row.alert { border-left-color: var(--accent-red); animation: pulse 1s infinite; }
    .qris-label {
        font-size: 10px;
        font-weight: 600;
        color: var(--text-secondary);
        white-space: nowrap;
    }
    .qris-value {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-primary);
        min-width: 28px;
        text-align: right;
        line-height: 1;
    }
    .qris-value.alert { color: var(--accent-red); }
</style>

    <style>
    @media (max-width: 600px) {
        .channel-grid, .ch-source-grid {

        }
        .streak-channel-name { font-size: 9px; }
        .streak-bar { width: 14px !important; height: 14px !important; }
        .streak-badge { font-size: 9px; padding: 2px 5px; }
        .source-header { font-size: 10px; }
    }

<script>
const DATA_FILE      = '../../Data_JSON/kibana/kibana_aggregation_result.json';
const BACKUP_FILE    = '../../Data_JSON/kibana/kibana_aggregation_result_perm.json';
const QRIS_FILE      = '../../Data_JSON/kibana/kibana_aggregation_result_qris.json';
const QRIS_BACKUP    = '../../Data_JSON/kibana/kibana_aggregation_result_qris_perm.json';
const INTERVAL_MS    = 10000;

let lastTimestamp     = null;
let lastQrisTimestamp = null;
let channelAlerts     = {};
let qrisAlertFired    = false;
let qrisAcqCurrent    = 0;
let qrisIssCurrent    = 0;
let qrisLastAlarmVal  = 0;
let qrisDataCache     = null; // last valid QRIS data (non-empty)

function escapeHtml(t) {
    const d = document.createElement('div'); d.textContent = t; return d.innerHTML;
}
function formatTime(iso) {
    try { return new Date(iso).toLocaleTimeString('id-ID'); } catch(e) { return '--:--:--'; }
}

async function fetchData() {
    try {
        const r = await fetch(DATA_FILE + '?t=' + Date.now());
        if (r.ok) {
            const d = await r.json();
            if (d && d.channel_breakdown && d.channel_breakdown.length > 0) return d;
        }
        const rb = await fetch(BACKUP_FILE + '?t=' + Date.now());
        return rb.ok ? await rb.json() : null;
    } catch(e) { return null; }
}

function buildBars(last4, small) {
    const size = small ? 14 : 18;
    let html = '';
    const emptySlots = 4 - last4.length;
    for (let i = 0; i < emptySlots; i++) html += `<div class="streak-bar empty" style="width:${size}px;height:${size}px;">·</div>`;
    last4.forEach(b => {
        const pct = (b.success_rate != null) ? Math.round(b.success_rate * 100) + '%' : '';
        if (b.is_red)         html += `<div class="streak-bar red"    style="width:${size}px;height:${size}px;" title="${b.ts_iso} | ${pct}">✗</div>`;
        else if (b.is_yellow) html += `<div class="streak-bar yellow" style="width:${size}px;height:${size}px;" title="${b.ts_iso} | ${pct}">!</div>`;
        else if (b.total > 0) html += `<div class="streak-bar green"  style="width:${size}px;height:${size}px;" title="${b.ts_iso} | ${pct}">✓</div>`;
        else                  html += `<div class="streak-bar empty"  style="width:${size}px;height:${size}px;" title="${b.ts_iso} | no tx">·</div>`;
    });
    return html;
}

    if (source === '194') {
        return `${KIBANA_194_BASE}?${KIBANA_GLOBALS}`;

    const q = encodeURIComponent(channelName);

const _waMessages = [];

function _regWa(msg) {
    _waMessages.push(msg);

function buildWaMsgQris(acqVal, issVal) {
    const lines = [];
    if (acqVal >= 10) lines.push(`- Terdapat error RC 05 Do not Honor > 10 - Qris Acquirer (${acqVal})`);
    if (issVal >= 10) lines.push(`- Terdapat error RC 05 Do not Honor > 10 - Qris issuer (${issVal})`);
    if (lines.length === 0) {
        if (acqVal > 0) lines.push(`- Terdapat error RC 05 Do not Honor > 10 - Qris Acquirer (${acqVal})`);
        if (issVal > 0) lines.push(`- Terdapat error RC 05 Do not Honor > 10 - Qris issuer (${issVal})`);
    }
    if (lines.length === 0) {
        lines.push(`- Terdapat error RC 05 Do not Honor > 10 - Qris Acquirer (${acqVal})`);
        lines.push(`- Terdapat error RC 05 Do not Honor > 10 - Qris issuer (${issVal})`);
    }
    return `Dear Team,\nmbak @Dana\nmbak @Aida\nEng @Gusti\n\nKami informasikan saat ini :\n\n${lines.join('\n')}\n\nTerpantau pada status transaksi Elastic Example Corp - *Multibiller Dashboard - QRIS*\nMohon dibantu pengecekannya\n\nTerima Kasih`;
}

function showCopyToast(msg) {
    const prev = document.getElementById('_nocCopyToast');
    if (prev) prev.remove();
    if (!document.getElementById('_nocToastStyle')) {
        const s = document.createElement('style');
        s.id = '_nocToastStyle';
        s.textContent = '@keyframes _nocToastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}';
        document.head.appendChild(s);
    }
    const el = document.createElement('div');
    el.id = '_nocCopyToast';
    el.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:99999;background:#1a3d22;color:#aff5b4;border:1px solid #3fb950;border-radius:8px;padding:11px 16px;font-family:Segoe UI,sans-serif;font-size:13px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,0.5);animation:_nocToastIn 0.25s ease;max-width:320px;min-width:180px;';
    el.innerHTML = `<span style="font-size:15px">✓</span><span style="flex:1;line-height:1.4">${msg}</span><span onclick="this.parentElement.remove()" style="cursor:pointer;opacity:0.6;font-size:14px;padding-left:6px">✕</span>`;
    document.body.appendChild(el);
    setTimeout(() => { if (el.parentElement) el.remove(); }, 4000);
}

function sendWa(msg) {
    navigator.clipboard.writeText(msg).then(() => {
        showCopyToast("Teks eskalasi ter-copy ke clipboard!");
    });
}

const RC_CODES  = ["00","03","05","12","13","14","18","31","33","68","94","99"];
const RC_LABELS = {"00":"Transaction Success","03":"Invalid Merchant","05":"Do Not Honor","12":"Invalid Transaction","13":"Invalid Amount","14":"Invalid PAN Number","18":"Customer Dispute","31":"Bank not supported by switch","33":"Invalid Customer ID","68":"Transaction Timeout","94":"Duplicate Transaction","99":"Generate Error"};

function buildRcTableHtml(roleData, roleTitle) {
    const BG = '#161b22';
    const C  = 'border:none;';

    let thRow = '', dataRow = '', footRow = '';
    RC_CODES.forEach(rc => {
        const cnt    = (roleData[rc] && roleData[rc].count) || 0;
        const tdText = cnt > 0 ? cnt.toLocaleString('id-ID') : '-';
        const tdColor = cnt === 0 ? '#484f58' : '#f0f6fc';

        thRow   += `<th style="width:8.333%;padding:8px 4px 10px;${C}background:${BG};font-size:11px;font-weight:700;text-align:center;white-space:normal;word-break:break-word;vertical-align:bottom;line-height:1.3;color:#f0f6fc;">RC ${rc} : ${RC_LABELS[rc]}</th>`;
        dataRow += `<td style="padding:10px 4px;${C}background:${BG};font-size:14px;font-weight:600;text-align:center;color:${tdColor};">${tdText}</td>`;
        footRow += `<td style="padding:7px 4px;${C}background:${BG};font-size:11px;font-weight:500;text-align:center;color:#f0f6fc;">Total: ${cnt > 0 ? cnt.toLocaleString('id-ID') : '0'}</td>`;
    });

    return `
        <div style="font-size:13px;font-weight:700;color:#f0f6fc;padding:14px 0 8px;">${roleTitle}</div>
        <div style="height:2px;background:#f0f6fc;"></div>
        <table style="width:100%;border-collapse:collapse;table-layout:fixed;border:none;">
            <thead><tr>${thRow}</tr></thead>
            <tbody>
                <tr>${dataRow}</tr>
                <tr><td colspan="12" style="padding:0;height:1px;background:#f0f6fc;border:none;"></td></tr>
                <tr>${footRow}</tr>
            </tbody>
        </table>`;
}

async function sendWaQris() {
    const btn = document.getElementById('qrisWaBtn');
    const origContent = btn.innerHTML;
    btn.innerHTML = '⏳'; btn.disabled = true;

    const waText = buildWaMsgQris(qrisAcqCurrent, qrisIssCurrent);

    // Ambil data RC lengkap
    let qrisData = null;
    try {
        const r = await fetch(QRIS_FILE + '?t=' + Date.now());
        if (r.ok) qrisData = await r.json();
    } catch(e) {}

    const ts = document.getElementById('lastUpdate').textContent || '--:--:--';

    const captureEl = document.createElement('div');
    captureEl.style.cssText = 'position:fixed;left:-9999px;top:0;background:#0d1117;font-family:Inter,system-ui,-apple-system,sans-serif;width:1340px;box-sizing:border-box;color:#f0f6fc;overflow:hidden;';

    if (qrisData && qrisData.acquirer && qrisData.issuer) {
        captureEl.innerHTML = `
            <div style="background:#161b22;padding:16px 24px 20px;">
                ${buildRcTableHtml(qrisData.acquirer, 'RC Code as Acquirer')}
            </div>
            <div style="height:32px;background:#0d1117;"></div>
            <div style="background:#161b22;padding:16px 24px 24px;">
                ${buildRcTableHtml(qrisData.issuer, 'RC Code as Issuer')}
            </div>
        `;
    } else {
        captureEl.innerHTML = `
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #21262d;">
                <div style="width:4px;height:36px;background:#f85149;border-radius:2px;flex-shrink:0;"></div>
                <div>
                    <div style="font-size:16px;font-weight:700;color:#f0f6fc;line-height:1.2;">QRIS Do Not Honor (RC 05)</div>
                    <div style="font-size:12px;color:#8b949e;margin-top:4px;">Data 15 menit terakhir &mdash; ${ts} WIB</div>
                </div>
            </div>
            <table style="width:100%;border-collapse:collapse;font-size:13px;">
                <thead><tr>
                    <th style="padding:9px 12px;border:1px solid #21262d;background:#161b22;font-size:11px;font-weight:700;color:#8b949e;text-align:left;">Role</th>
                    <th style="padding:9px 12px;border:1px solid #21262d;background:#161b22;font-size:11px;font-weight:700;color:#f85149;text-align:center;">RC 05 : Do Not Honor</th>
                </tr></thead>
                <tbody>
                <tr><td style="padding:10px 12px;border:1px solid #21262d;background:#0d1117;font-weight:500;color:#8b949e;">RC Code as Acquirer</td>
                    <td style="padding:10px 12px;border:1px solid #21262d;background:#0d1117;text-align:center;font-weight:700;font-size:18px;color:${qrisAcqCurrent>=10?'#f85149':'#3fb950'};">${qrisAcqCurrent}</td></tr>
                <tr><td style="padding:10px 12px;border:1px solid #21262d;background:#0a0e14;font-weight:500;color:#8b949e;">RC Code as Issuer</td>
                    <td style="padding:10px 12px;border:1px solid #21262d;background:#0a0e14;text-align:center;font-weight:700;font-size:18px;color:${qrisIssCurrent>=10?'#f85149':'#3fb950'};">${qrisIssCurrent}</td></tr>
                </tbody>
            </table>
        `;
    }
    document.body.appendChild(captureEl);

    try {
        const canvas = await html2canvas(captureEl, { backgroundColor: '#ffffff', scale: 2, logging: false });
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        document.body.removeChild(captureEl);
        if (blob) {
            try {
                await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                btn.innerHTML = '✓ WA';
                btn.style.borderColor = '#25D366'; btn.style.color = '#25D366';
                setTimeout(() => { sendWa(waText); }, 300);
            } catch(e) {
                btn.innerHTML = '✗';
                btn.style.borderColor = '#f85149'; btn.style.color = '#f85149';
                sendWa(waText);
            }
        } else {
            sendWa(waText);
        }
        setTimeout(() => { btn.innerHTML = origContent; btn.style.borderColor = ''; btn.style.color = ''; btn.disabled = false; }, 2500);
    } catch(e) {
        if (document.body.contains(captureEl)) document.body.removeChild(captureEl);
        btn.innerHTML = origContent; btn.disabled = false;
        sendWa(waText);
    }
}

// Hitung berapa kali channel sudah 4-bar merah dalam window bars (9 jam).
// Episode ke-2+ baru dihitung setelah minimal 2 bar null/hijau setelah episode sebelumnya.
function countAlertEpisodes(bars) {
    if (!bars || bars.length === 0) return 0;

    let episodes   = 0;
    let redRun     = 0;   // bar merah beruntun saat ini
    let inAlert    = false;
    let recovery   = 0;   // bar non-merah sejak alert terakhir

    for (const b of bars) {
        if (b.is_red) {
            redRun++;
            if (inAlert) {
                recovery = 0; // masih merah, reset recovery
            } else if (redRun >= 4) {
                episodes++;
                inAlert  = true;
                recovery = 0;
            }
        } else {
            redRun = 0;
            if (inAlert) {
                recovery++;
                if (recovery >= 2) {
                    inAlert  = false;
                    recovery = 0;
                }
            }
        }
    }

    return episodes;
}

function episodeBadge(count) {
    if (count <= 0) return '';
    const colors = ['', '#f85149', '#ff6b6b', '#ff4040'];
    const c = colors[Math.min(count, 3)] || '#ff4040';
    return `<span style="flex-shrink:0;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;border:1px solid ${c};color:${c};background:rgba(248,81,73,0.1);white-space:nowrap;">x${count}</span>`;
}

function buildRows(channels, source) {
    if (channels.length === 0) return '<div class="empty-row">✓ normal</div>';

    const red    = channels.filter(ch => ch.current_streak > 0);
    const normal = channels.filter(ch => ch.current_streak === 0);

    let html = '';

    red.forEach(ch => {
        const streak = ch.current_streak;
        const last4  = ch.last4_bars || [];
        const badgeClass = ['','warn1','warn2','warn3','critical'][Math.min(streak, 4)];
        const badgeText  = ch.all4_red ? '🚨 CRIT' : `${streak}/4`;
        const rowClass   = 'streak-row' + (ch.all4_red ? ' critical' : '');
        const kUrl = buildKibanaUrl(ch.channel, source);
        const waMsg = source === '194'
            ? buildWaMsg194(ch.channel)
            : buildWaMsg153(ch.channel);
        const epCount = countAlertEpisodes(ch.bars || []);
        html += `<div class="${rowClass}">
            <div class="streak-channel-name" title="${escapeHtml(ch.channel)}">${escapeHtml(ch.channel)}</div>
            ${episodeBadge(epCount)}
            <div class="streak-bars">${buildBars(last4, false)}</div>
            <span class="streak-badge ${badgeClass}">${badgeText}</span>
            ${kibanaBtn(kUrl)}
            ${waBtn(waMsg)}
        </div>`;
    });

    normal.forEach(ch => {
        const last4 = ch.last4_bars || [];
        const kUrl  = buildKibanaUrl(ch.channel, source);
        const waMsg = source === '194'
            ? buildWaMsg194(ch.channel)
            : buildWaMsg153(ch.channel);
        const epCount = countAlertEpisodes(ch.bars || []);
        html += `<div class="normal-row">
            <div class="streak-channel-name" title="${escapeHtml(ch.channel)}">${escapeHtml(ch.channel)}</div>
            ${epCount > 0 ? episodeBadge(epCount) : ''}
            <div class="streak-bars">${buildBars(last4, true)}</div>
            ${kibanaBtn(kUrl)}
            ${waBtn(waMsg)}
        </div>`;
    });

    return html;
}

function render(data) {
    if (!data || !data.channel_breakdown) return;

    document.getElementById('lastUpdate').textContent = formatTime(data.timestamp);

    const breakdown = data.channel_breakdown;

    // Split by source — tampilkan semua, merah di atas normal di bawah
    const by153 = breakdown.filter(ch => !ch.source || ch.source === '153');
    const by194 = breakdown.filter(ch => ch.source === '194');

    const red153 = by153.filter(ch => ch.current_streak > 0).length;
    const red194 = by194.filter(ch => ch.current_streak > 0).length;

    document.getElementById('count153').textContent = red153;
    document.getElementById('list153').innerHTML    = buildRows(by153, '153');

    document.getElementById('count194').textContent = red194;
    document.getElementById('list194').innerHTML    = buildRows(by194, '194');

    document.getElementById('totalBadge').textContent = red153 + red194;

    // Toast alert ke parent — kirim tiap render, dedup di parent (cooldown 5 menit)
    breakdown.forEach(ch => {
        if (ch.all4_red) {
            window.parent.postMessage({
                type: 'KIBANA_TOAST_ALERT',
                channel: `[${ch.source}] ${ch.channel}`,
                message: '4 bar merah beruntun — transaksi gagal terus-menerus'
            }, '*');
        }
    });
}

function qrisIsEmpty(d) {
    if (!d || !d.acquirer) return true;
    const total = Object.values(d.acquirer).reduce((s, v) => s + (v.count || 0), 0)
                + Object.values(d.issuer  || {}).reduce((s, v) => s + (v.count || 0), 0);
    return total === 0;
}

async function fetchQris() {
    try {
        const r = await fetch(QRIS_FILE + '?t=' + Date.now());
        if (r.ok) {
            const d = await r.json();
            if (d && d.do_not_honor) {
                if (qrisIsEmpty(d) && qrisDataCache) return qrisDataCache;
                if (!qrisIsEmpty(d)) qrisDataCache = d;
                return d;
            }
        }
        const rb = await fetch(QRIS_BACKUP + '?t=' + Date.now());
        return rb.ok ? await rb.json() : null;
    } catch(e) { return null; }
}

function renderQris(data) {
    if (!data || !data.do_not_honor) return;
    if (data.timestamp === lastQrisTimestamp) return;
    lastQrisTimestamp = data.timestamp;

    const dnh = data.do_not_honor;
    const acqVal = dnh.acquirer ?? 0;
    const issVal = dnh.issuer   ?? 0;
    const isAlert = dnh.alert;
    qrisAcqCurrent = acqVal;
    qrisIssCurrent = issVal;

    const acqEl    = document.getElementById('qrisAcq');
    const issEl    = document.getElementById('qrisIss');
    const acqValEl = document.getElementById('qrisAcqVal');
    const issValEl = document.getElementById('qrisIssVal');
    const alertEl  = document.getElementById('qrisAlert');

    acqValEl.textContent = acqVal;
    issValEl.textContent = issVal;

    const acqAlert = acqVal >= 10;
    const issAlert = issVal >= 10;

    acqEl.classList.toggle('alert', acqAlert);
    issEl.classList.toggle('alert', issAlert);
    acqValEl.classList.toggle('alert', acqAlert);
    issValEl.classList.toggle('alert', issAlert);

    if (isAlert) {
        alertEl.textContent = '!';
        alertEl.style.background = 'rgba(248,81,73,0.15)';
        alertEl.style.color = '#f85149';
        alertEl.style.border = '1px solid #f85149';
    } else {
        alertEl.textContent = '✓';
        alertEl.style.background = 'rgba(255,255,255,0.05)';
        alertEl.style.color = 'var(--text-secondary)';
        alertEl.style.border = '1px solid var(--border-default)';
    }

    const totalDnh = acqVal + issVal;

    if (isAlert) {
        const shouldFireFirst = !qrisAlertFired;
        const shouldFireEscalation = qrisAlertFired && (totalDnh >= qrisLastAlarmVal + 20);
        const shouldFireAmongus = totalDnh >= 200 && (totalDnh >= qrisLastAlarmVal + 20 || shouldFireFirst);

        if (shouldFireFirst || shouldFireEscalation) {
            qrisAlertFired = true;
            qrisLastAlarmVal = totalDnh;

            const alarmType = shouldFireAmongus ? 'kibana_qris_200' : 'kibana_qris';
            window.parent.postMessage({
                type: 'KIBANA_TOAST_ALERT',
                channel: 'QRIS Do Not Honor',
                message: `Acquirer: ${acqVal} | Issuer: ${issVal} — RC 05 >= 10`
            }, '*');
            window.parent.postMessage({ type: 'QRIS_DNH_ALARM', alarmType }, '*');
        }
    } else {
        qrisAlertFired = false;
        qrisLastAlarmVal = 0;
    }
}

async function update() {
    const [data, qris] = await Promise.all([fetchData(), fetchQris()]);
    if (data) {
        if (data.timestamp !== lastTimestamp) {
            lastTimestamp = data.timestamp;
        }
        render(data); // selalu render agar postMessage dikirim tiap interval
    }
    if (qris) renderQris(qris);
}

update();
setInterval(update, INTERVAL_MS);
</script>
