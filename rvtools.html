<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Database RVTools - NOC Acme</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0a0e14;
            --bg-surface: #11161d;
            --bg-elevated: #161c25;
            --bg-elevated-hover: #1c2330;
            --border-subtle: #21262d;
            --border-default: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --transition: 180ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        body {
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-blue); }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            background: linear-gradient(180deg, var(--bg-surface), var(--bg-base));
            border-bottom: 1px solid var(--border-subtle);
            z-index: 20;
            box-shadow: var(--shadow-sm);
        }
        .brand-title {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.4px;
            background: linear-gradient(135deg, #58a6ff, #79c0ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .badge-live {
            background: linear-gradient(135deg, #3fb950, #2ea043);
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 6px rgba(63, 185, 80, 0.25);
        }
        .btn-action {
            background: var(--bg-elevated);
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
            letter-spacing: 0.3px;
            transition: all var(--transition);
        }
        .btn-action:hover {
            background: var(--accent-blue);
            color: var(--bg-base);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(88, 166, 255, 0.3);
        }
        .btn-close-tab {
            background: transparent;
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
            letter-spacing: 0.3px;
            transition: all var(--transition);
        }
        .btn-close-tab:hover {
            background: var(--accent-red);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(248, 81, 73, 0.3);
        }

        /* CONTAINER TABS */
        #rvtoolsTabs {
            display: flex;
            gap: 6px;
            padding: 12px 24px 0 24px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-subtle);
            overflow-x: auto;
        }

        #rvtoolsColMenu {
            display: none;
            background: var(--bg-elevated);
            padding: 16px;
            border-bottom: 1px solid var(--border-subtle);
            max-height: 180px;
            overflow-y: auto;
            flex-wrap: wrap;
            gap: 8px;
            box-shadow: inset 0 -10px 10px -10px rgba(0,0,0,0.4);
        }
        .table-container { flex: 1; overflow: auto; padding: 0; background: var(--bg-base); }
    </style>
    <script src="page/tools/rvtools_manager.js"></script>
</head>
<body>

    <div class="header-bar">
        <div style="display: flex; align-items: center; gap: 15px;">
            <h4 class="brand-title">🖥️ MULTI-SITE RVTOOLS MASTER</h4>
            <span class="badge-live">LIVE RAM DB</span>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <button onclick="toggleRvColumnMenu()" class="btn-action">👁️ HIDE / SHOW COLUMNS</button>
            <div style="position:relative;">
                <button onclick="toggleRvFilesMenu(this)" class="btn-action" style="border-color:#3fb950; color:#3fb950;">📂 FILE RVTOOLS ▾</button>
                <div id="rvFilesDropdown" style="display:none; position:absolute; right:0; top:calc(100% + 6px); background:#11161d; border:1px solid #30363d; border-radius:8px; min-width:240px; box-shadow:0 8px 24px rgba(0,0,0,0.6); z-index:999; padding:4px 0; white-space:nowrap;">
                    <div style="padding:6px 14px 4px; color:#6e7681; font-size:10px; letter-spacing:0.5px; font-weight:600; border-bottom:1px solid #21262d; margin-bottom:4px;">FOLDER RVTOOLS</div>
                    <button onclick="window.open('Data_JSON/RVTOOLS/','_blank')" style="width:100%; background:none; border:none; color:#8b949e; padding:7px 14px; text-align:left; cursor:pointer; font-family:inherit; font-size:11px; display:flex; align-items:center; gap:8px;" onmouseover="this.style.background='#161c25'" onmouseout="this.style.background='none'">📁 Buka Folder RVTOOLS</button>
                    <div id="rvFilesList" style="border-top:1px solid #21262d; margin-top:4px; padding-top:4px;">
                        <div style="padding:7px 14px; color:#484f58; font-size:10px; font-style:italic;">Memuat daftar file...</div>
                    </div>
                </div>
            </div>
            <button onclick="window.close()" class="btn-close-tab">❌ TUTUP TAB</button>
        </div>
    </div>

    <div id="rvtoolsTabs"></div>

    <div id="rvtoolsColMenu"></div>

    <div class="table-container">
        <div id="rvtoolsTableArea" style="min-width: max-content;">
            <div style="padding: 30px; color: #d29922; font-size: 14px;">⏳ Sedang memindai folder Data_JSON/RVTOOLS/...</div>
        </div>
    </div>

    <script>
        function toggleRvColumnMenu() {
            const menu = document.getElementById('rvtoolsColMenu');
            menu.style.display = menu.style.display === 'none' ? 'flex' : 'none';
        }

        let _rvFilesLoaded = false;
        function toggleRvFilesMenu(btn) {
            const drop = document.getElementById('rvFilesDropdown');
            const isOpen = drop.style.display !== 'none';
            drop.style.display = isOpen ? 'none' : 'block';
            if (!isOpen && !_rvFilesLoaded) {
                loadRvFilesList();
            }
        }

        async function loadRvFilesList() {
            const listEl = document.getElementById('rvFilesList');
            try {
                const res = await fetch('Data_JSON/RVTOOLS/');
                if (!res.ok) throw new Error('Folder tidak bisa diakses');
                const html = await res.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const links = Array.from(doc.querySelectorAll('a'));
                const files = links
                    .map(a => decodeURIComponent(a.getAttribute('href')))
                    .filter(href => /\.(xlsx|csv|xls)$/i.test(href));

                if (files.length === 0) {
                    listEl.innerHTML = '<div style="padding:7px 14px; color:#484f58; font-size:10px; font-style:italic;">Tidak ada file Excel/CSV ditemukan</div>';
                    return;
                }

                const icons = { xlsx: '📗', xls: '📗', csv: '📄' };
                listEl.innerHTML = files.map(f => {
                    const ext = f.split('.').pop().toLowerCase();
                    const icon = icons[ext] || '📄';
                    const name = f.split('/').pop();
                    const url = 'Data_JSON/RVTOOLS/' + encodeURIComponent(name);
                    return `<a href="${url}" download style="display:flex; align-items:center; gap:8px; padding:7px 14px; color:#c9d1d9; font-size:11px; text-decoration:none; font-family:inherit;" onmouseover="this.style.background='#161c25'; this.style.color='#58a6ff'" onmouseout="this.style.background='none'; this.style.color='#c9d1d9'">${icon} ${name}</a>`;
                }).join('');
                _rvFilesLoaded = true;
            } catch (e) {
                listEl.innerHTML = `<div style="padding:7px 14px; color:#f85149; font-size:10px;">⚠ Gagal memuat: ${e.message}</div>`;
            }
        }

        document.addEventListener('click', function(e) {
            const drop = document.getElementById('rvFilesDropdown');
            if (!drop || drop.style.display === 'none') return;
            const btn = drop.previousElementSibling;
            if (!drop.contains(e.target) && e.target !== btn) {
                drop.style.display = 'none';
            }
        });
    </script>
</body>
</html>
