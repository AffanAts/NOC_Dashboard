<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>NOC Asset Verificator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <!-- Load Ticket Verifier Logic Jika Diperlukan -->
    <script src="page/tools/ticket_verifier.js"></script>
    <style>
        :root {
            --bg-base: #0a0e14;
            --bg-surface: #11161d;
            --bg-elevated: #161c25;
            --bg-elevated-hover: #1c2330;
            --border-subtle: #21262d;
            --border-default: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-yellow: #f1e05a;
            --accent-red: #f85149;
            --accent-purple: #d2a8ff;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --transition: 180ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        body {
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .header {
            padding: 16px 30px;
            background: linear-gradient(180deg, var(--bg-surface), var(--bg-base));
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }
        .main-content { flex: 1; display: flex; padding: 25px 30px; gap: 25px; overflow: hidden; }
        .left-panel { flex: 1; display: flex; flex-direction: column; gap: 16px; max-width: 450px; }
        .right-panel { flex: 2; display: flex; flex-direction: column; gap: 15px; overflow: hidden; }
        button { cursor: pointer; transition: all var(--transition); font-family: 'Inter', system-ui, sans-serif; }
        button:active { transform: scale(0.97); }

        /* Brand Title */
        .brand-title {
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.4px;
            background: linear-gradient(135deg, var(--accent-yellow), #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Tabs Container */
        .mode-tabs {
            display: flex;
            background: var(--bg-elevated);
            padding: 4px;
            border-radius: 10px;
            border: 1px solid var(--border-subtle);
            gap: 4px;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
        }
        .mode-tabs button {
            border: none;
            padding: 7px 18px;
            border-radius: 7px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: all var(--transition);
        }
        .mode-tabs button:not(.active) {
            background: transparent;
            color: var(--text-secondary);
        }
        .mode-tabs button:not(.active):hover {
            background: var(--bg-elevated-hover);
            color: var(--text-primary);
        }

        /* Close Button */
        .btn-close {
            background: linear-gradient(135deg, #da3633, #b62324);
            border: none;
            color: white;
            padding: 9px 22px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.4px;
            box-shadow: 0 2px 8px rgba(218, 54, 51, 0.3);
        }
        .btn-close:hover {
            background: linear-gradient(135deg, #f04742, #c62826);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(218, 54, 51, 0.45);
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-blue); }

        /* Styling khusus untuk link IP Grafana */
        .grafana-ip-link { color: var(--accent-blue); text-decoration: none; font-weight: 600; transition: all var(--transition); cursor: pointer; }
        .grafana-ip-link:hover { text-decoration: underline; color: #79c0ff; text-shadow: 0 0 8px rgba(88,166,255,0.5); }
    </style>
</head>
<body>

    <div class="header">
        <div style="display: flex; gap: 20px; align-items: center;">
            <span class="brand-title">📡 NOC ASSET VERIFICATOR</span>
            <div class="mode-tabs">
                <button id="btnModeOpm" onclick="setCheckerMode('OPM')" class="active" style="background: var(--accent-green); color: white;">OPMANAGER</button>
                <button id="btnModeGrafana" onclick="setCheckerMode('GRAFANA')">GRAFANA</button>
                <button id="btnModeExtract" onclick="setCheckerMode('EXTRACT')">⚡ JSON TO IP</button>
                <button id="btnModeTicket" onclick="setCheckerMode('TICKET')">🎫 TICKET STATUS</button>
            </div>
        </div>
        <button onclick="window.close()" class="btn-close">TUTUP TAB INI</button>
    </div>

    <div class="main-content">
        <div class="left-panel">
            <label id="inputLabel" style="color: var(--text-secondary); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Paste List IP / Hostname:</label>

            <div style="flex: 1; display: flex; gap: 10px;">
                <textarea id="bulkInput" wrap="off" placeholder="10.100.x.x&#10;10,100,x,x"
                    style="flex: 1; background: var(--bg-surface); border: 1px solid var(--border-default); color: var(--accent-blue); padding: 16px; border-radius: 10px; resize: none; font-size: 13px; line-height: 1.7; outline: none; font-family: 'JetBrains Mono', 'Consolas', monospace; transition: all var(--transition);"
                    onfocus="this.style.borderColor='var(--accent-blue)'; this.style.boxShadow='0 0 0 3px rgba(88,166,255,0.12)'"
                    onblur="this.style.borderColor='var(--border-default)'; this.style.boxShadow='none'"></textarea>
            </div>

            <button id="actionBtn" onclick="processIpCheck()" style="background: linear-gradient(135deg, #3fb950, #2ea043); border: none; color: white; padding: 16px; border-radius: 10px; font-weight: 700; font-size: 14px; letter-spacing: 1.5px; box-shadow: 0 4px 12px rgba(63, 185, 80, 0.25); transition: all var(--transition);"
                onmouseover="this.style.transform='translateY(-1px)'; this.style.boxShadow='0 6px 18px rgba(63, 185, 80, 0.4)'"
                onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 12px rgba(63, 185, 80, 0.25)'">🔍 ANALYZE LIST</button>

            <div id="ticketSubTabs" style="display: none; background: var(--bg-elevated); border: 1px solid var(--border-subtle); padding: 10px; border-radius: 10px; gap: 6px; flex-wrap: wrap;">
                <div style="width: 100%; color: var(--text-secondary); font-size: 10px; font-weight: 700; margin-bottom: 6px; text-align: center; letter-spacing: 0.8px;">FILTER & COMPARE DATA (TICKET MODE)</div>
                <div style="display: flex; gap: 6px; width: 100%; justify-content: center;">
                    <button onclick="setTicketSubMode('ALL')" id="st_ALL" style="background: #8957e5; color: white; border: none; padding: 7px 12px; border-radius: 7px; font-size: 10px; font-weight: 700; flex: 1;">ALL EXCEL</button>
                    <button onclick="setTicketSubMode('GRAF_EXCEL')" id="st_GRAF_EXCEL" style="background: transparent; color: var(--text-primary); border: 1px solid var(--border-default); padding: 7px 12px; border-radius: 7px; font-size: 10px; font-weight: 700; flex: 1;">GRAF EXCEL</button>
                    <button onclick="setTicketSubMode('OPM_EXCEL')" id="st_OPM_EXCEL" style="background: transparent; color: var(--text-primary); border: 1px solid var(--border-default); padding: 7px 12px; border-radius: 7px; font-size: 10px; font-weight: 700; flex: 1;">OPM EXCEL</button>
                </div>
                <div style="display: flex; gap: 6px; width: 100%; justify-content: center; margin-top: 4px;">
                    <button onclick="setTicketSubMode('COMP_GRAF')" id="st_COMP_GRAF" style="background: transparent; color: var(--accent-yellow); border: 1px solid var(--border-default); padding: 7px 12px; border-radius: 7px; font-size: 10px; font-weight: 700; flex: 1;">VS APP GRAFANA</button>
                    <button onclick="setTicketSubMode('COMP_OPM')" id="st_COMP_OPM" style="background: transparent; color: #ff7b72; border: 1px solid var(--border-default); padding: 7px 12px; border-radius: 7px; font-size: 10px; font-weight: 700; flex: 1;">VS APP OPMANAGER</button>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div id="checkStats" style="font-size: 13px; font-weight: 700; text-align: right; color: var(--text-secondary); letter-spacing: 0.3px; margin-bottom: 6px;"></div>
            <div id="checkResult" style="flex: 1; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 12px; overflow-y: auto; box-shadow: var(--shadow-md);">
                <div style="padding: 60px; text-align: center; color: var(--text-secondary); font-size: 13px;">Input data and click Analyze.</div>
            </div>
        </div>
    </div>

    <script>
    let checkerMode = 'OPM'; 

    function setCheckerMode(mode) {
        checkerMode = mode;
        const btns = {
            'OPM': document.getElementById('btnModeOpm'),
            'GRAFANA': document.getElementById('btnModeGrafana'),
            'EXTRACT': document.getElementById('btnModeExtract'),
            'TICKET': document.getElementById('btnModeTicket')
        };

        Object.keys(btns).forEach(k => {
            btns[k].style.background = (k === mode) ? (k === 'EXTRACT' ? '#1f6feb' : (k === 'TICKET' ? '#8957e5' : '#238636')) : 'transparent';
            btns[k].style.color = (k === mode) ? 'white' : '#8b949e';
        });

        const lbl = document.getElementById('inputLabel');
        const inputBulk = document.getElementById('bulkInput');
        const btn = document.getElementById('actionBtn');
        const subTabs = document.getElementById('ticketSubTabs');

        subTabs.style.display = (mode === 'TICKET') ? 'flex' : 'none';
        if (mode !== 'TICKET') {
            const inp = document.getElementById('detailIssueSearchInput');
            if (inp) inp.value = '';
            if (typeof onVerifierSearch === 'function') onVerifierSearch('');
        }

        if (mode === 'EXTRACT') {
            lbl.innerText = "Paste Raw JSON Grafana Here:";
            btn.innerText = "⚡ EXTRACT & FORMAT IP";
            btn.style.background = "#1f6feb";
            inputBulk.placeholder = 'Paste JSON here...';
        } else if (mode === 'TICKET') {
            lbl.innerText = "Blok 4 Kolom di Excel, Copy, lalu Paste ke sini:";
            btn.innerText = "🎫 VERIFY TICKETS";
            btn.style.background = "#8957e5";
            inputBulk.placeholder = 'Format Excel:\n[Tanggal]  [Case]  [Detail Issue]  [IP Address]\n\nContoh:\n10/9/25 23:14 \t OPManager - Disk \t Memory Utilization is 77%... \t 10.30.0.1';
        } else {
            lbl.innerText = "Paste List IP / Hostname:";
            btn.innerText = "🔍 ANALYZE LIST";
            btn.style.background = "#238636";
            inputBulk.placeholder = '10.100.x.x\n10.200.x.x';
        }
        
        document.getElementById('checkResult').innerHTML = `<div style="padding: 60px; text-align: center; color: #484f58; font-size: 13px;">Mode switched to ${mode}.</div>`;
    }

    function copyFullColumn(className, btn) {
        // Jangan hapus link grafana jika sedang ambil data
        const elements = document.querySelectorAll('.' + className);
        let textToCopy = "";
        elements.forEach((el, index) => {
            // Ambil teks asli dari elemen, abaikan tag HTML
            textToCopy += el.innerText.trim() + (index === elements.length - 1 ? "" : "\n");
        });
        navigator.clipboard.writeText(textToCopy).then(() => {
            const originalText = btn.innerText;
            btn.innerText = "COPIED!";
            setTimeout(() => { btn.innerText = originalText; }, 1500);
        });
    }

    function copyIpAndHostname(btn) {
        const ipElements = document.querySelectorAll('.col-ip');
        const dnameElements = document.querySelectorAll('.col-dname');
        let textToCopy = "";
        ipElements.forEach((el, index) => {
            const ip = el.innerText.trim();
            const dname = dnameElements[index] ? dnameElements[index].innerText.trim() : "Not";
            textToCopy += `${ip} - [${dname}]\n`;
        });
        navigator.clipboard.writeText(textToCopy.trim()).then(() => {
            const originalText = btn.innerText; btn.innerText = "COPIED!"; setTimeout(() => { btn.innerText = originalText; }, 1500);
        });
    }

    // FUNGSI KHUSUS BUKA GRAFANA DARI TAB BARU
    window.openGrafanaForIp = function(ip) {
        const url = `https://grafana.example.com:3000/d/noc-dash-beta/noc-overview-v2?orgId=1&from=now-1h&to=now&timezone=browser&var-nodeip_green=$__all&var-nodename_green=$__all&var-nodeip_red=$__all&var-nodename_red=$__all&var-nodeip_all=${ip}&refresh=30s`;
        window.open(url, '_blank');
    };

    async function processIpCheck() {
        const inputText = document.getElementById('bulkInput').value;
        const resultArea = document.getElementById('checkResult');
        const statsArea = document.getElementById('checkStats');
        
        if (!inputText.trim()) return;

        if (checkerMode === 'TICKET') {
            if (typeof processTicketVerification === "function") {
                return processTicketVerification(inputText);
            } else {
                resultArea.innerHTML = `<div style="padding:60px; text-align:center; color:#f85149;">❌ Error: Fungsi Ticket Verifier tidak ditemukan.</div>`;
                return;
            }
        }

        if (checkerMode === 'EXTRACT') {
            try {
                const regexAvail = /"(?:url|displayNameFromDS)"\s*:\s*"([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)"/g;
                const regexInstance = /"instance"\s*:\s*"([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)(?::[0-9]+)?"/g;
                let match, extractedIps = [];
                while ((match = regexAvail.exec(inputText)) !== null) { extractedIps.push(match[1]); }
                while ((match = regexInstance.exec(inputText)) !== null) { extractedIps.push(match[1]); }
                
                const uniqueIps = [...new Set(extractedIps)]; 
                if (uniqueIps.length === 0) { 
                    resultArea.innerHTML = `<div style="padding:60px; text-align:center; color:#f85149;">❌ No IP found in JSON.</div>`; return; 
                }
                
                let htmlExtract = `<div style="padding:15px; border-bottom:1px solid #30363d; display:flex; justify-content:space-between; align-items:center;"><span style="color:#8b949e; font-size:13px;">Formatted List (${uniqueIps.length} IPs)</span><button onclick="copyExtractResults(this)" style="background:#238636; color:white; border:none; padding:6px 16px; border-radius:4px; cursor:pointer; font-size:12px;">Copy All</button></div><div id="formattedOutput" style="padding:20px; color:#c9d1d9; font-size:13px; line-height:1.8; white-space: pre-wrap;">`;
                uniqueIps.forEach((ip, idx) => { htmlExtract += `"${ip}"${idx === uniqueIps.length - 1 ? "" : ",\n"}`; });
                htmlExtract += `</div>`;
                
                resultArea.innerHTML = htmlExtract; statsArea.innerHTML = `EXTRACTED: ${uniqueIps.length}`;
                return;
            } catch (e) { resultArea.innerHTML = `<div style="padding:60px; text-align:center; color:#f85149;">❌ Error processing JSON.</div>`; return; }
        }

        resultArea.innerHTML = '<div style="padding:60px; text-align:center; color:#8b949e; font-size:14px;">🔄 Analyzing...</div>';
        
        // --- MODE 3 & 4: OPM & GRAFANA ASSET CHECKER ---
        const rawLines = inputText.split(/\n/);
        const cleanIps = rawLines.map(line => line.replace(/,/g, '.').trim()).filter(ip => ip !== "");

        try {
            let ipMap = {}; 
            
            // Load API Data Lokal
            const [fResp, invResp, rvtoolsResp] = await Promise.all([
                fetch('Data_JSON/filter.json?t=' + Date.now()),
                fetch('Data_JSON/opmanager_inventory.json?t=' + Date.now()),
                fetch('Data_JSON/RVTOOLS.json?t=' + Date.now()).catch(() => null)
            ]);

            const filterData = await fResp.json();
            const registeredIps = [...(filterData.v1 || []), ...(filterData.v2 || [])];
            
            const invData = await invResp.json();
            const inventory = invData.rows || [];

            // 🌟 KEAJAIBAN MEGA-DICTIONARY (RVTools Object + OPM) 🌟
            let megaKamus = {};

            // 1. Ambil dari OpManager Inventory
            inventory.forEach(i => {
                let invIp = (i.ipaddress || "").trim();
                let invName = (i.displayName || "").trim();
                if (invIp && invName) megaKamus[invIp] = invName;
            });

            // 2. Ambil dari RVTools
            if (rvtoolsResp && rvtoolsResp.ok) {
                const rvData = await rvtoolsResp.json();
                Object.keys(rvData).forEach(ip => {
                    megaKamus[ip] = rvData[ip].VM;
                });
            }

            if (checkerMode === 'OPM') {
                inventory.forEach(item => { 
                    if(item.ipaddress) ipMap[item.ipaddress] = { found: true, dname: megaKamus[item.ipaddress] || item.displayName || "N/A" }; 
                });
            } else {
                // Untuk Grafana, Tarik Data Dari Parent Window
                let parentWin = window.opener;
                if (!parentWin) {
                    resultArea.innerHTML = `<div style="padding:60px; text-align:center; color:#f85149;">❌ Halaman ini harus dibuka langsung dari Master Dashboard agar bisa membaca data Iframe Grafana.</div>`;
                    return;
                }

                const iframes = {
                    ava: parentWin.document.querySelector('iframe[src*="availability.html"]'),
                    cpu: parentWin.document.querySelector('iframe[src*="cpu_monitor.html"]'),
                    mem: parentWin.document.querySelector('iframe[src*="memory_monitor.html"]')
                };

                const getIframeData = (iframe, varPrefix) => {
                    if (!iframe) return;
                    const win = iframe.contentWindow;
                    if (!win) return;
                    Object.keys(win).filter(k => k.startsWith(varPrefix)).forEach(key => {
                        const src = win[key];
                        if (src?.results?.A?.frames) {
                            src.results.A.frames.forEach(f => {
                                const labels = f.schema.fields[1].labels;
                                const ip = (labels.url || labels.instance || "").split(':')[0].trim();
                                const val = f.data.values[1].slice(-1)[0] || 0;
                                
                                if (!ip || !registeredIps.includes(ip)) return; 
                                
                                const dname = megaKamus[ip] || "Unknown Host";
                                if (!ipMap[ip]) ipMap[ip] = { ava: false, cpu: false, mem: false, dname: dname };
                                
                                if (varPrefix === 'dataDS') ipMap[ip].ava = (val < 100);
                                if (varPrefix === 'dataCPU') ipMap[ip].cpu = true;
                                if (varPrefix === 'dataMem') ipMap[ip].mem = true;
                            });
                        }
                    });
                };
                getIframeData(iframes.ava, 'dataDS');
                getIframeData(iframes.cpu, 'dataCPU');
                getIframeData(iframes.mem, 'dataMem');
            }

            const headBtnStyle = `background:transparent; border:none; color:#58a6ff; cursor:pointer; font-size:10px; text-decoration:underline; display:block; margin:auto; margin-top:5px;`;
            const multiBtnContainer = `display:flex; gap:10px; justify-content:center;`;

            let htmlTable = `<table style="width: 100%; border-collapse: collapse; font-size: 12px;">
                <thead style="background: #161b22; position: sticky; top:0; z-index:10; box-shadow: 0 1px 0 #30363d;">
                    <tr>
                        <th style="padding: 14px 10px; text-align: center; color: #8b949e; width: 60px;">NO.</th>
                        <th style="padding: 14px 10px; text-align: left; color: #8b949e; width: 180px;">TARGET IP <div style="${multiBtnContainer}"><button onclick="copyFullColumn('col-ip', this)" style="${headBtnStyle}">Copy IP</button><button onclick="copyIpAndHostname(this)" style="${headBtnStyle}; color:#f1e05a;">Copy IP-[Host]</button></div></th>
                        <th style="padding: 14px 10px; text-align: left; color: #8b949e;">DISPLAY NAME <button onclick="copyFullColumn('col-dname', this)" style="${headBtnStyle}">Copy Name</button></th>
                        ${checkerMode === 'OPM' ? `<th style="padding: 14px 10px; text-align: center; color: #8b949e; width: 100px;">OPM STATUS <button onclick="copyFullColumn('col-opm', this)" style="${headBtnStyle}">Copy</button></th>` : `<th style="padding: 14px 10px; text-align: center; color: #8b949e; width: 80px;">AVAIL <button onclick="copyFullColumn('col-ava', this)" style="${headBtnStyle}">Copy</button></th><th style="padding: 14px 10px; text-align: center; color: #8b949e; width: 80px;">CPU <button onclick="copyFullColumn('col-cpu', this)" style="${headBtnStyle}">Copy</button></th><th style="padding: 14px 10px; text-align: center; color: #8b949e; width: 80px;">MEM <button onclick="copyFullColumn('col-mem', this)" style="${headBtnStyle}">Copy</button></th>`}
                    </tr>
                </thead><tbody>`;

            let matchSuccess = 0;
            cleanIps.forEach((targetIp, index) => {
                const data = ipMap[targetIp];
                if (!!data) matchSuccess++;
                
                let finalDName = data?.dname || megaKamus[targetIp] || "tidak ada";

                // Logika Clickable IP Khusus Grafana (Warna tetap merah jika false, biru jika true, tapi ada underline)
                let renderedIp = targetIp;
                if (checkerMode === 'GRAFANA') {
                    // Gunakan class .grafana-ip-link
                    const linkColor = !!data ? '#58a6ff' : '#f85149';
                    renderedIp = `<a href="javascript:void(0)" onclick="openGrafanaForIp('${targetIp}')" class="grafana-ip-link" style="color: ${linkColor};" title="Buka di Grafana All Panel">${targetIp}</a>`;
                } else {
                    renderedIp = `<span style="color: ${!!data ? '#c9d1d9' : '#f85149'}; font-weight:bold;">${targetIp}</span>`;
                }

                htmlTable += `<tr style="border-bottom: 1px solid #21262d;">
                    <td style="padding: 12px 10px; text-align:center; color: #8b949e; border-right: 1px solid #30363d;">${index + 1}</td>
                    <td class="col-ip" style="padding: 12px 10px;">${renderedIp}</td>
                    <td class="col-dname" style="padding: 12px 10px; color: ${finalDName === 'tidak ada' ? '#f85149' : '#8b949e'};">${finalDName}</td>
                    ${checkerMode === 'OPM' ? `<td class="col-opm" style="padding: 12px 10px; text-align:center; color: ${data?.found ? '#3fb950' : '#f85149'}">${data?.found ? 'ada' : 'tidak ada'}</td>` : `<td class="col-ava" style="padding: 12px 10px; text-align:center; color: ${data?.ava ? '#3fb950' : '#f85149'}">${data?.ava ? 'ada' : 'tidak ada'}</td><td class="col-cpu" style="padding: 12px 10px; text-align:center; color: ${data?.cpu ? '#3fb950' : '#f85149'}">${data?.cpu ? 'ada' : 'tidak ada'}</td><td class="col-mem" style="padding: 12px 10px; text-align:center; color: ${data?.mem ? '#3fb950' : '#f85149'}">${data?.mem ? 'ada' : 'tidak ada'}</td>`}
                </tr>`;
            });

            htmlTable += '</tbody></table>';
            resultArea.innerHTML = htmlTable;
            statsArea.innerHTML = `ROWS PROCESSED: ${cleanIps.length} | MATCHED: ${matchSuccess}`;
        } catch (e) { resultArea.innerHTML = `<div style="padding:60px; text-align:center; color:#f85149;">❌ Error: ${e.message}</div>`; }
    }

    function copyExtractResults(btn) {
        navigator.clipboard.writeText(document.getElementById('formattedOutput').innerText).then(() => {
