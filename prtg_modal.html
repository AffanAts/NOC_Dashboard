<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>PRTG Modal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0a0e14;
            --bg-surface: #11161d;
            --bg-elevated: #161c25;
            --border-subtle: #21262d;
            --border-default: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-blue: #58a6ff;
            --accent-yellow: #f1e05a;
            --accent-red: #f85149;
            --accent-green: #3fb950;
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.6);
            --transition: 180ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        body { margin: 0; padding: 0; background: transparent; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; overflow: hidden; -webkit-font-smoothing: antialiased; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }

        .modal-box {
            background: linear-gradient(180deg, var(--bg-surface), var(--bg-base));
            border: 1px solid var(--border-default);
            border-radius: 14px;
            width: 900px; max-height: 90vh; display: flex; flex-direction: column;
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,0.03) inset;
            color: var(--text-primary);
        }

        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-subtle); padding: 22px 28px;
        }
        .modal-title {
            color: var(--accent-yellow);
            font-weight: 700; font-size: 16px; letter-spacing: 0.5px;
        }
        .modal-close {
            background: transparent; border: none; color: var(--accent-red);
            font-size: 22px; cursor: pointer; padding: 4px 10px;
            border-radius: 6px;
            transition: all var(--transition);
        }
        .modal-close:hover { background: rgba(248, 81, 73, 0.1); transform: rotate(90deg); }

        .modal-body { padding: 24px 28px; overflow-y: auto; flex-grow: 1; }

        .prtg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
        .prtg-col-title {
            background: var(--bg-elevated);
            padding: 10px 14px;
            font-size: 12px;
            font-weight: 700;
            border-left: 3px solid var(--accent-blue);
            margin-bottom: 16px;
            border-radius: 0 8px 8px 0;
            letter-spacing: 0.4px;
        }

        /* Kotak Statistik */
        .prtg-stats-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; }
        .prtg-stat-box {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            transition: all var(--transition);
        }
        .prtg-stat-box:hover { border-color: var(--border-default); transform: translateY(-1px); }
        .prtg-stat-title { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.5px; }
        .prtg-stat-num { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', 'Consolas', monospace; }
        
        /* List Alarm & Tombol WA Per-Masalah */
        .prtg-alarm-list { max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .prtg-alarm-card {
            background: var(--bg-base);
            border: 1px solid var(--border-subtle);
            border-left: 3px solid var(--accent-red);
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 10px;
            transition: all var(--transition);
        }
        .prtg-alarm-card:hover { transform: translateX(2px); box-shadow: var(--shadow-md); }

        /* --- PENYOROTAN UNTUK CABANG PRIORITAS (VIP) --- */
        .priority-highlight {
            background: linear-gradient(135deg, rgba(248,81,73,0.08), var(--bg-base));
            border: 1px solid var(--accent-red);
            border-left: 5px solid var(--accent-red);
            box-shadow: 0 0 16px rgba(248, 81, 73, 0.15);
        }
        .vip-badge {
            background: linear-gradient(135deg, #f85149, #da3633);
            color: white; font-size: 9px; font-weight: 700;
            padding: 3px 8px; border-radius: 4px; margin-left: 8px; vertical-align: middle;
            text-transform: uppercase; letter-spacing: 0.6px;
            box-shadow: 0 2px 6px rgba(248, 81, 73, 0.3);
        }

        .p-time {
            color: #ff7b72;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px; font-weight: 700;
            background: rgba(248, 81, 73, 0.1);
            padding: 3px 8px;
            border-radius: 6px;
        }
        .p-dev { font-weight: 700; color: #d2a8ff; font-size: 12px; margin-bottom: 4px; flex-grow: 1; }
        .priority-highlight .p-dev { color: #ff7b72; }
        .p-sens { color: var(--text-secondary); font-size: 11px; }
        .p-empty {
            text-align: center;
            color: var(--accent-green);
            font-style: italic;
            font-size: 12px;
            padding: 24px;
            border: 1px dashed var(--border-subtle);
            border-radius: 8px;
            background: var(--bg-elevated);
        }

        /* Tombol WA Kecil Spesifik */
        .btn-wa-small {
            background: linear-gradient(135deg, #3fb950, #2ea043);
            border: none; color: white; font-weight: 700; font-size: 10px;
            padding: 6px 12px; border-radius: 6px;
            text-decoration: none; display: flex; align-items: center; gap: 5px;
            transition: all var(--transition);
            box-shadow: 0 2px 6px rgba(63, 185, 80, 0.2);
        }
        .btn-wa-small:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(63, 185, 80, 0.4);
        }

        .txt-down { color: var(--accent-red); }
        .txt-warn { color: #d29922; }
        .txt-up { color: var(--accent-green); }
        .txt-pause { color: var(--accent-blue); }

        /* Footer Modal */
        .modal-footer {
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid var(--border-subtle);
            padding: 18px 28px;
            background: var(--bg-base);
            border-radius: 0 0 14px 14px;
        }
        .btn-close {
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border-default);
            padding: 9px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            transition: all var(--transition);
        }
        .btn-close:hover {
            background: var(--bg-surface);
            color: var(--text-primary);
            border-color: var(--border-default);
            transform: translateY(-1px);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-blue); }
    </style>
</head>
<body>

<div class="modal-overlay" id="overlay" onclick="closeModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span class="modal-title">📡 PRTG STATUS MONITORING</span>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        
        <div class="modal-body prtg-grid" id="prtgContentBox">
            <div style="grid-column: span 2; text-align: center; color: #8b949e; padding: 30px;">
                <h3 style="color:#58a6ff">Menarik Data PRTG...</h3>
            </div>
        </div>

        <div class="modal-footer">
            <div id="prtgSyncTime" style="color: #8b949e; font-size: 11px; font-style: italic;">Last Sync: --:--:--</div>
            <button class="btn-close" onclick="closeModal()">TUTUP</button>
        </div>
    </div>
</div>

<script>
function showCopyToast(msg) {
    const prev = document.getElementById('_nocCopyToast');
    if (prev) prev.remove();
    if (!document.getElementById('_nocToastStyle')) {
        const s = document.createElement('style');
        s.id = '_nocToastStyle';
        s.textContent = '@keyframes _nocToastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}';
        document.head.appendChild(s);
    }
    const el = document.createElement('div');
    el.id = '_nocCopyToast';
    el.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:99999;background:#1a3d22;color:#aff5b4;border:1px solid #3fb950;border-radius:8px;padding:11px 16px;font-family:Segoe UI,sans-serif;font-size:13px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,0.5);animation:_nocToastIn 0.25s ease;max-width:320px;min-width:180px;';
    el.innerHTML = `<span style="font-size:15px">✓</span><span style="flex:1;line-height:1.4">${msg}</span><span onclick="this.parentElement.remove()" style="cursor:pointer;opacity:0.6;font-size:14px;padding-left:6px">✕</span>`;
    document.body.appendChild(el);
    setTimeout(() => { if (el.parentElement) el.remove(); }, 4000);
}
window._prtgWaTexts = {};
function _prtgCopyWa(key) {
    const txt = window._prtgWaTexts[key];
    if (!txt) return;
    navigator.clipboard.writeText(txt).then(() => showCopyToast("Teks PRTG ter-copy ke clipboard!"));
}
    function closeModal(event) {
        if (event && event.target !== document.getElementById('overlay')) return;
        window.parent.closePrtgModal();
    }

    function generateColumn(title, dataObj) {
        let stats = dataObj?.summary || {};
        let alarms = dataObj?.alarms || [];
        let cleanTitle = title.replace(/<[^>]+>/g, '').trim(); 
        
        // Daftar Cabang Prioritas
        const targetSites = ['kantor pusat kota-a', 'kantor pusat kota-b', 'kantor pusat kota-c', 'training-center', 'Kantor Pusat', 'KP ','kantor pusat'];
        const isVIP = dev => {
            const d = dev.toLowerCase();
            if (targetSites.some(site => d.includes(site.toLowerCase()))) return true;
            if (d.includes('kota-c') && !d.includes('gai')) return true;
            return false;
        };

        let html = `<div><div class="prtg-col-title">${title}</div>`;
        html += `<div class="prtg-stats-container">
            <div class="prtg-stat-box"><div class="prtg-stat-title">🔴 Down</div><div class="prtg-stat-num txt-down">${stats["Down"] || 0}</div></div>
            <div class="prtg-stat-box"><div class="prtg-stat-title">🟡 Warn</div><div class="prtg-stat-num txt-warn">${stats["Warning"] || 0}</div></div>
            <div class="prtg-stat-box"><div class="prtg-stat-title">🟢 Up</div><div class="prtg-stat-num txt-up">${stats["Up"] || 0}</div></div>
            <div class="prtg-stat-box"><div class="prtg-stat-title">🔵 Paused</div><div class="prtg-stat-num txt-pause">${stats["Paused"] || 0}</div></div>
        </div><div class="prtg-alarm-list">`;

        if (alarms.length === 0) {
            html += `<div class="p-empty">✅ Semua perangkat terpantau NORMAL / UP.</div>`;
        } else {
            // Kita urutkan agar yang VIP selalu tampil paling atas
            alarms.sort((a, b) => {
                let aIsVIP = isVIP(a.device) ? 1 : 0;
                let bIsVIP = isVIP(b.device) ? 1 : 0;
                return bIsVIP - aIsVIP;
            });

            alarms.forEach(a => {
                // Cek apakah perangkat ini masuk prioritas
                let isPriority = isVIP(a.device);
                
                // Set class CSS dan Badge tambahan jika dia prioritas
                let cardClass = isPriority ? "prtg-alarm-card priority-highlight" : "prtg-alarm-card";
                let badgeHtml = isPriority ? `<span class="vip-badge">⭐ VIP</span>` : "";
                
                let waText = `🚨 *PRIORITY 1 - PRTG ALERT NOC* 🚨\n\n🌐 *Kategori:* ${cleanTitle}\n🖥️ *Device:* ${a.device}\n⚠️ *Sensor:* ${a.sensor}\n⏳ *Downtime:* ${a.downtime}\n\nMohon bantuan tim terkait untuk segera melakukan pengecekan. Terima kasih.`;
                const waKey = `${cleanTitle}_${a.device}`.replace(/\W/g, '_');
                window._prtgWaTexts[waKey] = waText;

                html += `
                <div class="${cardClass}">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 8px;">
                        <div class="p-dev">${a.device} ${badgeHtml}</div>
                        <span class="p-time">⏳ ${a.downtime}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div class="p-sens">Sensor: ${a.sensor}</div>
                        <button onclick="_prtgCopyWa('${waKey}')" class="btn-wa-small" title="Copy teks eskalasi ke clipboard">📱 WA (P1)</button>
                    </div>
                </div>`;
            });
        }
        return html + `</div></div>`;
    }

    function refreshData() {
        const scriptId = 'dynPrtgScript';
        let oldScript = document.getElementById(scriptId);
        if (oldScript) oldScript.remove();

        let newScript = document.createElement('script');
        newScript.id = scriptId;
        newScript.src = `Data_JSON/prtg_data.js?t=${Date.now()}`;
        
        newScript.onload = () => {
            if (typeof prtgData !== 'undefined') {
                let mplsHtml = generateColumn("🌐 MPLS Example Corp", prtgData.MPLS);
                let intHtml = generateColumn("🌍 INTERNET Example Corp", prtgData.INTERNET);
                
                document.getElementById('prtgContentBox').innerHTML = mplsHtml + intHtml;
                document.getElementById('prtgSyncTime').innerText = `Data ditarik pada: ${prtgData.lastUpdate || '--:--:--'}`;
            }
        };
        document.head.appendChild(newScript);
    }

    window.triggerRefresh = function() { refreshData(); }

    refreshData();
    setInterval(refreshData, 15000); 
</script>
</body>
</html>
